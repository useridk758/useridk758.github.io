<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA | PLATINUM v86.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #1DB954; --bg: #000; --card: #121212; --hover: #1f1f1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* MOUSE FIX */
        #dot { position: fixed; width: 12px; height: 12px; background: #fff; border-radius: 50%; z-index: 9999999; pointer-events: none; box-shadow: 0 0 20px #fff; transform: translate(-50%, -50%); mix-blend-mode: difference; transition: transform 0.1s ease-out; }
        
        /* UPDATES SQUARE */
        #identity-square { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); 
            width: 400px; height: 400px; background: rgba(15, 15, 15, 0.98); 
            border: 1px solid var(--accent); border-radius: 32px; z-index: 150000; 
            display: none; flex-direction: column; padding: 40px; box-shadow: 0 0 100px rgba(0,0,0,1); 
            backdrop-filter: blur(20px); opacity: 0;
        }
        #identity-square.active { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .ui-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 105000; display: none; flex-direction: column; padding: 60px; overflow-y: auto; opacity: 0; transform: translateY(30px); }
        .ui-layer.active { display: flex; opacity: 1; transform: translateY(0); }

        .premium-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; width: 100%; }
        .premium-card { background: var(--card); padding: 20px; border-radius: 24px; cursor: pointer !important; border: 1px solid rgba(255,255,255,0.05); }
        .premium-card:hover { background: var(--hover); transform: translateY(-10px); border-color: var(--accent); }

        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 200000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .name-input { background: transparent; border-bottom: 2px solid var(--accent); font-size: 36px; text-align: center; outline: none; padding: 10px; width: 400px; color: white; }
    </style>
</head>
<body>

    <div id="dot"></div>

    <div id="auth-overlay">
        <h2 class="text-[10px] tracking-[0.8em] opacity-30 mb-8 uppercase font-bold">Initialize System</h2>
        <input type="text" id="user-name" class="name-input" placeholder="ACCESS KEY" onkeypress="if(event.key==='Enter') Core.initialize(this.value)">
    </div>

    <div id="identity-square">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-[10px] uppercase tracking-widest text-[#1DB954]">System Updates</h3>
            <button onclick="Core.closeIdentity()" class="text-xs opacity-50 hover:opacity-100">✕ Close</button>
        </div>
        <div class="flex-1 space-y-4 text-sm">
            <p>- Fixed Games Archive clicking bug.</p>
            <p>- Restored smooth mouse tracking.</p>
            <p>- Enabled dual-AI Selection Hub.</p>
            <p>- Math engine logic verified (100%).</p>
            <p>- All 11 game links updated and verified.</p>
        </div>
        <button onclick="Core.closeIdentity()" class="w-full bg-[#1DB954] text-black py-4 rounded-2xl font-black text-[10px] uppercase mt-6">Acknowledge</button>
    </div>

    <canvas id="star-canvas" class="fixed inset-0 z-0"></canvas>

    <div id="dock" class="fixed bottom-10 left-1/2 -translate-x-1/2 flex gap-6 bg-black/80 backdrop-blur-2xl border border-white/10 p-4 rounded-[2.5rem] z-[110000] opacity-0 pointer-events-none transition-all duration-1000">
        <button onclick="Core.closeUI()" class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-xl hover:bg-[#1DB954] hover:text-black">🏠</button>
        <button onclick="Core.openUI('games')" class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-xl hover:bg-[#1DB954] hover:text-black">🎮</button>
        <button onclick="Core.openUI('ai')" class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-xl hover:bg-[#1DB954] hover:text-black">🤖</button>
    </div>

    <div id="games-layer" class="ui-layer">
        <div class="flex justify-between items-center mb-12"><h1 class="text-6xl font-black tracking-tighter">Archive</h1><button onclick="Core.closeUI()" class="bg-white text-black px-8 py-3 rounded-full font-bold text-xs uppercase">Close</button></div>
        <div id="games-container" class="premium-grid"></div>
    </div>

    <div id="ai-layer" class="ui-layer">
        <div class="flex justify-between items-center mb-10"><h1 class="text-4xl font-black tracking-tighter">AI Selection</h1><button onclick="Core.closeUI()" class="opacity-50 hover:opacity-100">Close</button></div>
        <div class="flex-1 flex flex-col items-center justify-center gap-10">
            <h2 class="text-xl font-bold">What AI would you like to use today?</h2>
            <div class="flex gap-6 w-full max-w-2xl">
                <button onclick="AI.openInternal()" class="flex-1 bg-white/5 p-10 rounded-3xl border border-white/10 hover:border-[#1DB954]">
                    <div class="text-3xl mb-2">🤖</div>
                    <div class="font-black">Nebula AI</div>
                </button>
                <button onclick="Core.launch('https://freezenova.ai/chat/', true)" class="flex-1 bg-white/5 p-10 rounded-3xl border border-white/10 hover:border-[#1DB954]">
                    <div class="text-3xl mb-2">❄️</div>
                    <div class="font-black">Freezenova</div>
                </button>
            </div>
        </div>
        <div id="ai-interface" class="hidden flex-1 flex flex-col pt-10">
            <div id="chat-container" class="flex-1 overflow-y-auto mb-4 p-4 space-y-4"></div>
            <input type="text" id="chat-input" class="w-full bg-white/5 border border-white/10 p-6 rounded-2xl outline-none" placeholder="Ask math or games..." onkeypress="if(event.key==='Enter') AI.send()">
        </div>
    </div>

    <div id="workspace" class="fixed inset-0 z-[120000] hidden bg-black opacity-0">
        <div class="absolute top-6 right-6 z-[130000] flex gap-4">
            <button id="fs-btn" onclick="Core.toggleFullscreen()" class="bg-white/10 px-5 py-2 rounded-xl text-[10px] font-bold uppercase">Fullscreen</button>
            <button onclick="Core.exitSession()" class="bg-red-500 px-5 py-2 rounded-xl text-[10px] font-bold uppercase">Exit</button>
        </div>
        <div id="render-target" class="w-full h-full"></div>
    </div>

    <script>
        const GamesList = [
            { name: "FNAF 1", url: "https://useridk758.github.io/somethingislikereallyreallyreallywrongwithmerightnow/", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/319510/capsule_616x353.jpg" },
            { name: "FNAF 2", url: "https://markakopian-sudo.github.io/understandme/", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/332800/capsule_616x353.jpg" },
            { name: "FNAF 3", url: "https://markakopian-sudo.github.io/wtfgng/", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/354140/capsule_616x353.jpg" },
            { name: "FNAF 4", url: "https://markakopian-sudo.github.io/anasun/", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/388090/capsule_616x353.jpg" },
            { name: "Five Nights at Epstein's", url: "https://useridk758.github.io/underestimatablepig/", img: "https://cdn.jsdelivr.net/gh/gn-math/covers@main/710.png" },
            { name: "Geometry Dash Lite", url: "https://markakopian-sudo.github.io/eureka/", img: "https://pbs.twimg.com/profile_images/1963796314237648897/cS6pffoT_400x400.jpg" },
            { name: "Block Blast", url: "https://markakopian-sudo.github.io/sevakanaxperutsun/", img: "https://imgs.crazygames.com/block-puzzle-master_1x1/20250924025352/block-puzzle-master_1x1-cover?format=auto&quality=70&metadata=none" },
            { name: "AdVenture Capitalist", url: "https://useridk758.github.io/adventcapital/", img: "https://cdn.mobygames.com/covers/7866638-adventure-capitalist-android-front-cover.jpg" },
            { name: "1v1.lol", url: "https://useridk758.github.io/my-html-games/", img: "https://cdn-bgp.bluestacks.com/BGP/us/gametiles_lol.onevone.jpg" },
            { name: "A Difficult Game About Climbing", url: "https://useridk758.github.io/hardtoclimb/", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRMCgrTI8LP3J1QFEAC1nwVHlmu6ZTaK0wu-4YZ9Nsk-ntKwf219RuYuKOGB4U9Mrh-O52hHQ&s=10" },
            { name: "10 Minutes Till Dawn", url: "https://useridk758.github.io/abracadabraanaunanainthebigfrafratotheboogadaa/", img: "https://img.itch.zone/aW1nLzg3MTU5NzMucG5n/original/0LqGxb.png" }
        ];

        const AI = {
            openInternal() {
                document.querySelector('#ai-layer h2').style.display = 'none';
                document.querySelector('#ai-layer .flex.gap-6').style.display = 'none';
                document.getElementById('ai-interface').classList.remove('hidden');
            },
            send() {
                const input = document.getElementById('chat-input');
                const val = input.value.trim();
                if(!val) return;
                this.addMsg("user", val);
                input.value = "";
                setTimeout(() => {
                    const mathMatch = val.match(/(\d+[\s\+\-\*\/\^\(\).]*\d+)/);
                    if (mathMatch) { try { this.addMsg("ai", `Result: ${eval(mathMatch[0].replace(/\^/g, '**'))}`); return; } catch(e){} }
                    const g = GamesList.find(x => val.toLowerCase().includes(x.name.toLowerCase()));
                    if(g) { this.addMsg("ai", `Launching ${g.name}...`); setTimeout(() => Core.launch(g.url), 800); return; }
                    this.addMsg("ai", "I'm the Nebula Beta. I can do math and launch games.");
                }, 700);
            },
            addMsg(role, text) {
                const c = document.getElementById('chat-container');
                const d = document.createElement('div');
                d.className = role === 'ai' ? 'bg-white/5 p-4 rounded-xl self-start max-w-[80%]' : 'bg-[#1DB954] text-black p-4 rounded-xl self-end max-w-[80%] font-bold';
                d.innerText = text;
                c.appendChild(d);
                c.scrollTop = c.scrollHeight;
            }
        };

        const Core = {
            initialize(name) {
                if(!name) return;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('dock').style.opacity = '1';
                document.getElementById('dock').style.pointerEvents = 'all';
                this.drawStars();
                this.openIdentity();
                this.loadGames();
            },
            loadGames() {
                const container = document.getElementById('games-container');
                container.innerHTML = GamesList.map(g => `
                    <div class="premium-card" onclick="Core.launch('${g.url}')">
                        <img src="${g.img}" class="w-full aspect-video rounded-xl mb-4 object-cover">
                        <div class="font-bold uppercase text-[10px] tracking-widest">${g.name}</div>
                    </div>
                `).join('');
            },
            openIdentity() {
                const sq = document.getElementById('identity-square');
                sq.style.display = 'flex';
                setTimeout(() => sq.classList.add('active'), 50);
            },
            closeIdentity() {
                const sq = document.getElementById('identity-square');
                sq.classList.remove('active');
                setTimeout(() => sq.style.display = 'none', 400);
            },
            openUI(id) {
                this.closeUI();
                const el = document.getElementById(id + '-layer');
                el.style.display = 'flex';
                setTimeout(() => el.classList.add('active'), 50);
            },
            closeUI() {
                document.querySelectorAll('.ui-layer').forEach(l => {
                    l.classList.remove('active');
                    setTimeout(() => l.style.display = 'none', 400);
                });
            },
            launch(url, isFree) {
                this.closeUI();
                const ws = document.getElementById('workspace');
                document.getElementById('fs-btn').style.display = isFree ? 'none' : 'block';
                document.getElementById('render-target').innerHTML = `<iframe src="${url}" class="w-full h-full border-none"></iframe>`;
                ws.classList.remove('hidden');
                setTimeout(() => ws.style.opacity = '1', 50);
            },
            exitSession() {
                const ws = document.getElementById('workspace');
                ws.style.opacity = '0';
                setTimeout(() => { ws.classList.add('hidden'); document.getElementById('render-target').innerHTML = ''; }, 500);
            },
            toggleFullscreen() {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            },
            drawStars() {
                const canvas = document.getElementById('star-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                for(let i=0; i<200; i++) {
                    ctx.fillStyle = `rgba(255,255,255,${Math.random()})`;
                    ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1.5, 0, Math.PI*2); ctx.fill();
                }
            }
        };

        // MOUSE LOGIC FIX
        window.addEventListener('mousemove', e => {
            const dot = document.getElementById('dot');
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
