<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA | PLATINUM v79.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #1DB954; --bg: #000; --card: #121212; --hover: #1f1f1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        #star-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        #dot { position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%; z-index: 9999999; pointer-events: none; box-shadow: 0 0 15px #fff; transform: translate(-50%, -50%); mix-blend-mode: difference; }
        
        .ui-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-blur: 40px; z-index: 105000; display: none; flex-direction: column; padding: 60px; overflow-y: auto; opacity: 0; transform: scale(1.1); }
        .ui-layer.active { display: flex; opacity: 1; transform: scale(1); }

        .premium-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .premium-card { background: var(--card); padding: 20px; border-radius: 24px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .premium-card:hover { background: var(--hover); transform: translateY(-12px) scale(1.03); border-color: var(--accent); box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        .premium-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 16px; margin-bottom: 15px; }

        #chat-container { max-width: 800px; margin: 0 auto; width: 100%; height: 60vh; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding: 20px; }
        .bubble { padding: 16px 24px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.6; }
        .ai-bubble { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .user-bubble { background: var(--accent); color: black; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }

        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 200000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .name-input { background: transparent; border-bottom: 2px solid var(--accent); font-size: 36px; text-align: center; outline: none; padding: 10px; width: 400px; font-weight: 900; color: white; letter-spacing: -2px; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="auth-overlay">
        <h2 class="text-[10px] tracking-[0.8em] opacity-30 mb-8 uppercase font-bold fade-in">Nebula Platinum | Initialize</h2>
        <input type="text" id="user-name" class="name-input" placeholder="ACCESS KEY" autocomplete="off" onkeypress="if(event.key==='Enter') Core.initialize(this.value)">
    </div>

    <canvas id="star-canvas"></canvas>
    <div id="dot"></div>
    
    <div id="top-bar" class="fixed top-0 left-0 w-full h-24 flex items-center px-12 z-[110000] opacity-0 pointer-events-none">
        <div class="font-black text-2xl italic tracking-tighter">NEBULA<span class="text-[#1DB954]">OS</span></div>
        <div class="ml-auto flex gap-10 text-[10px] font-bold tracking-[0.3em] items-center opacity-40">
            <span id="display-name" class="uppercase"></span>
            <div id="system-time">00:00:00</div>
        </div>
    </div>

    <div id="games-layer" class="ui-layer">
        <div class="flex justify-between items-end mb-16"><h1 class="text-7xl font-black tracking-tighter">Archive</h1><button onclick="Core.closeUI()" class="bg-white text-black px-10 py-4 rounded-full font-black text-[10px] uppercase">Return</button></div>
        <div id="games-container" class="premium-grid pb-24"></div>
    </div>

    <div id="music-layer" class="ui-layer">
        <div class="flex justify-between items-center mb-16"><h1 class="text-7xl font-black tracking-tighter">Media</h1><button onclick="Core.closeUI()" class="bg-white text-black px-10 py-4 rounded-full font-black text-[10px] uppercase">Return</button></div>
        <div class="bg-white/5 p-12 rounded-[3rem] text-center opacity-40">Standby</div>
    </div>

    <div id="suggestions-layer" class="ui-layer">
        <div class="flex justify-between items-center mb-16"><h1 class="text-7xl font-black tracking-tighter">Request</h1><button onclick="Core.closeUI()" class="bg-white text-black px-10 py-4 rounded-full font-black text-[10px] uppercase">Return</button></div>
        <div class="max-w-3xl bg-white/5 p-12 rounded-[2.5rem] border border-white/5">
            <textarea class="w-full bg-black/50 border border-white/10 p-6 rounded-2xl outline-none focus:border-[#1DB954] text-lg mb-6" rows="4" placeholder="Suggestion..."></textarea>
            <button class="bg-[#1DB954] text-black px-12 py-5 rounded-2xl font-black text-xs uppercase">Submit</button>
        </div>
    </div>

    <div id="ai-layer" class="ui-layer">
        <div class="flex justify-between items-center mb-10"><h1 id="ai-header" class="text-5xl font-black tracking-tighter text-[#1DB954]">Nexus AI</h1><button onclick="Core.closeUI()" class="bg-white/10 text-white px-8 py-3 rounded-full font-black text-[10px] uppercase">Return</button></div>
        <div id="ai-setup" class="flex-1 flex flex-col items-center justify-center">
            <p class="text-[10px] tracking-[0.5em] opacity-30 mb-4 uppercase font-bold">Designation Required</p>
            <input type="text" id="ai-name-input" class="bg-transparent border-b-2 border-white/20 text-4xl text-center outline-none py-4 w-[500px] font-black focus:border-[#1DB954]" placeholder="NAME YOUR AI">
            <button onclick="AI.setup()" class="mt-10 bg-white text-black px-12 py-4 rounded-full font-black text-xs uppercase hover:scale-110">Initialize</button>
        </div>
        <div id="ai-interface" class="hidden flex-1 flex flex-col">
            <div id="chat-container"></div>
            <div class="max-w-[800px] w-full mx-auto relative mt-5">
                <input type="text" id="chat-input" class="w-full bg-white/5 border border-white/10 rounded-3xl py-6 px-10 outline-none focus:border-[#1DB954] pr-20 text-lg" placeholder="Ask to open a game..." onkeypress="if(event.key==='Enter') AI.send()">
                <button onclick="AI.send()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white text-black w-12 h-12 rounded-full font-black">↑</button>
            </div>
        </div>
    </div>

    <div id="workspace" class="fixed inset-0 z-[120000] hidden bg-black opacity-0 transition-all duration-700">
        <div class="absolute top-8 right-10 z-[130000] flex gap-4">
            <button onclick="Core.toggleFullscreen()" class="bg-white/10 backdrop-blur-xl text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase border border-white/10">Fullscreen</button>
            <button onclick="Core.exitSession()" class="bg-red-500 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-2xl hover:bg-red-600">Close Application</button>
        </div>
        <div id="render-target" class="w-full h-full"></div>
    </div>

    <div id="dock" class="fixed bottom-12 left-1/2 -translate-x-1/2 flex gap-6 bg-black/40 backdrop-blur-3xl border border-white/5 p-5 rounded-[3rem] z-[100001] opacity-0 translate-y-20 pointer-events-none">
        <button onclick="Core.closeUI()" class="w-16 h-16 bg-white/5 rounded-3xl flex items-center justify-center text-2xl hover:bg-[#1DB954] hover:text-black">🏠</button>
        <button onclick="Core.openUI('games')" class="w-16 h-16 bg-white/5 rounded-3xl flex items-center justify-center text-2xl hover:bg-[#1DB954] hover:text-black">🎮</button>
        <button onclick="Core.openUI('music')" class="w-16 h-16 bg-white/5 rounded-3xl flex items-center justify-center text-2xl hover:bg-[#1DB954] hover:text-black">🎵</button>
        <button onclick="Core.openUI('ai')" class="w-16 h-16 bg-white/5 rounded-3xl flex items-center justify-center text-2xl hover:bg-[#1DB954] hover:text-black">🤖</button>
        <button onclick="Core.openUI('suggestions')" class="w-16 h-16 bg-white/5 rounded-3xl flex items-center justify-center text-2xl hover:bg-[#1DB954] hover:text-black">💡</button>
        <button onclick="Core.aboutBlankCloak()" class="w-16 h-16 bg-white/5 rounded-3xl flex items-center justify-center text-2xl hover:bg-white/20">🕵️</button>
    </div>

    <script>
        // HARD-LOCKED GAME DATA (NO CHANGES)
        const GamesList = [
            { name: "FNAF 1", url: "https://useridk758.github.io/somethingislikereallyreallyreallywrongwithmerightnow/", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/319510/capsule_616x353.jpg" },
            { name: "FNAF 2", url: "https://markakopian-sudo.github.io/understandme/", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/332800/capsule_616x353.jpg" },
            { name: "FNAF 3", url: "https://markakopian-sudo.github.io/wtfgng/", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/354140/capsule_616x353.jpg" },
            { name: "FNAF 4", url: "https://markakopian-sudo.github.io/anasun/", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/388090/capsule_616x353.jpg" },
            { name: "Five Nights at Epstein's", url: "https://useridk758.github.io/underestimatablepig/", img: "https://cdn.jsdelivr.net/gh/gn-math/covers@main/710.png" },
            { name: "Geometry Dash Lite", url: "https://markakopian-sudo.github.io/eureka/", img: "https://pbs.twimg.com/profile_images/1963796314237648897/cS6pffoT_400x400.jpg" },
            { name: "Block Blast", url: "https://markakopian-sudo.github.io/sevakanaxperutsun/", img: "https://imgs.crazygames.com/block-puzzle-master_1x1/20250924025352/block-puzzle-master_1x1-cover?format=auto&quality=70&metadata=none" },
            { name: "AdVenture Capitalist", url: "https://useridk758.github.io/adventcapital/", img: "https://cdn.mobygames.com/covers/7866638-adventure-capitalist-android-front-cover.jpg" },
            { name: "1v1.lol", url: "https://useridk758.github.io/my-html-games/", img: "https://cdn-bgp.bluestacks.com/BGP/us/gametiles_lol.onevone.jpg" },
            { name: "A Difficult Game About Climbing", url: "https://useridk758.github.io/hardtoclimb/", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRMCgrTI8LP3J1QFEAC1nwVHlmu6ZTaK0wu-4YZ9Nsk-ntKwf219RuYuKOGB4U9Mrh-O52hHQ&s=10" },
            { name: "10 Minutes Till Dawn", url: "https://useridk758.github.io/abracadabraanaunanainthebigfrafratotheboogadaa/", img: "https://img.itch.zone/aW1nLzg3MTU5NzMucG5n/original/0LqGxb.png" }
        ];

        let assistantName = "Romulus";

        const AI = {
            setup() {
                const name = document.getElementById('ai-name-input').value;
                if(!name) return;
                assistantName = name;
                document.getElementById('ai-header').innerText = assistantName.toUpperCase();
                document.getElementById('ai-setup').style.display = "none";
                document.getElementById('ai-interface').classList.remove('hidden');
                this.addMessage("ai", `Hello, how can I help you today?`);
            },
            send() {
                const input = document.getElementById('chat-input');
                const val = input.value.trim();
                if(!val) return;
                this.addMessage("user", val);
                input.value = "";

                // SMART COMMAND CHECKING
                const game = GamesList.find(g => val.toLowerCase().includes(g.name.toLowerCase()));
                
                setTimeout(() => {
                    if (game) {
                        this.addMessage("ai", `Acknowledged. Initializing "${game.name}" module now.`);
                        setTimeout(() => Core.launch(game.url), 1000);
                    } else {
                        this.addMessage("ai", `I am ${assistantName}. I can launch any archive module if you say its name. Try saying "Open FNAF 1" or "Block Blast".`);
                    }
                }, 800);
            },
            addMessage(role, text) {
                const cont = document.getElementById('chat-container');
                const div = document.createElement('div');
                div.className = `bubble ${role}-bubble fade-in`;
                div.innerText = text;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;
            }
        };

        const Core = {
            initialize(name) {
                if(!name) return;
                document.getElementById('display-name').innerText = name;
                document.getElementById('auth-overlay').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = "none";
                    document.getElementById('top-bar').style.opacity = "1";
                    document.getElementById('dock').style.opacity = "1";
                    document.getElementById('dock').style.transform = "translate(-50%, 0)";
                    document.getElementById('dock').style.pointerEvents = "all";
                }, 600);
                this.drawStars();
                setInterval(() => { document.getElementById('system-time').innerText = new Date().toLocaleTimeString(); }, 1000);
            },
            openUI(id) { 
                this.closeUI(); 
                const el = document.getElementById(id+'-layer');
                el.style.display = "flex";
                setTimeout(() => el.classList.add('active'), 10);
            },
            closeUI() { 
                document.querySelectorAll('.ui-layer').forEach(l => {
                    l.classList.remove('active');
                    setTimeout(() => { if(!l.classList.contains('active')) l.style.display = "none"; }, 500);
                });
            },
            launch(url) {
                this.closeUI();
                const ws = document.getElementById('workspace');
                document.getElementById('render-target').innerHTML = `<iframe src="${url}" class="w-full h-full border-none"></iframe>`;
                ws.classList.remove('hidden');
                setTimeout(() => { ws.style.opacity = "1"; }, 50);
            },
            exitSession() { 
                const ws = document.getElementById('workspace');
                ws.style.opacity = "0";
                setTimeout(() => { ws.classList.add('hidden'); document.getElementById('render-target').innerHTML = ""; }, 700);
            },
            toggleFullscreen() {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            },
            aboutBlankCloak() {
                const w = window.open('about:blank');
                w.document.body.innerHTML = `<iframe src="${location.href}" style="width:100vw;height:100vh;border:none;position:fixed;top:0;left:0;"></iframe>`;
            },
            drawStars() {
                const canvas = document.getElementById('star-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                for(let i=0; i<300; i++) {
                    ctx.fillStyle = `rgba(255,255,255,${Math.random()})`;
                    ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1, 0, Math.PI*2); ctx.fill();
                }
            }
        };

        document.getElementById('games-container').innerHTML = GamesList.map(g => `
            <div class="premium-card fade-in" onclick="Core.launch('${g.url}')">
                <img src="${g.img}">
                <div class="font-bold text-sm truncate uppercase tracking-tighter">${g.name}</div>
            </div>
        `).join('');

        window.onmousemove = e => { 
            const dot = document.getElementById('dot'); 
            dot.style.left = e.clientX + 'px'; 
            dot.style.top = e.clientY + 'px'; 
        };
    </script>
</body>
</html>
