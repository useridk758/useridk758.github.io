<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA | SINGULARITY v87.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #1DB954; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* SHOCK EFFECT: Neural Vibration */
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -2px 0 red, 2px 0 blue; }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .glitch-text { animation: glitch 0.2s infinite; color: var(--accent) !important; font-family: 'Space Mono', monospace; }

        #star-canvas { position: fixed; inset: 0; z-index: 0; filter: blur(1px); }
        #dot { position: fixed; width: 12px; height: 12px; background: #fff; border-radius: 50%; z-index: 9999999; pointer-events: none; box-shadow: 0 0 20px #fff, 0 0 40px var(--accent); mix-blend-mode: difference; transition: transform 0.1s ease-out; }
        
        /* Glassmorphism Evolution */
        .ui-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(50px) saturate(150%); z-index: 105000; display: none; flex-direction: column; padding: 60px; opacity: 0; transform: scale(1.1) rotateX(10deg); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .ui-layer.active { display: flex; opacity: 1; transform: scale(1) rotateX(0deg); }

        .bubble { padding: 20px 25px; border-radius: 24px; max-width: 80%; font-size: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ai-bubble { background: linear-gradient(145deg, #161616, #000); align-self: flex-start; }
        .user-bubble { background: var(--accent); color: #000; align-self: flex-end; font-weight: 800; transform: rotateZ(-1deg); }

        /* THE MATRIX OVERLAY */
        #matrix-canvas { position: fixed; inset: 0; z-index: 200000; pointer-events: none; opacity: 0; transition: opacity 2s; }
    </style>
</head>
<body oncontextmenu="return false">

    <canvas id="matrix-canvas"></canvas>

    <div id="auth-overlay" class="fixed inset-0 bg-black z-[200000] flex items-center justify-center flex-col">
        <div class="mb-4 text-[10px] tracking-[1em] text-white/20 uppercase font-black">System Override Required</div>
        <input type="text" id="user-name" class="bg-transparent border-b-4 border-[#1DB954] text-6xl text-center outline-none p-4 w-[500px] font-black italic tracking-tighter" placeholder="INIT_PROTOCOL" autocomplete="off" onkeypress="if(event.key==='Enter') Core.initialize(this.value)">
    </div>

    <canvas id="star-canvas"></canvas>
    <div id="dot"></div>
    
    <div id="ai-layer" class="ui-layer">
        <div class="flex justify-between items-center mb-10">
            <h1 id="ai-header" class="text-6xl font-black italic tracking-tighter">NEXUS_CORE</h1>
            <button onclick="Core.closeUI()" class="bg-white/10 hover:bg-white text-white hover:text-black px-10 py-4 rounded-full font-black text-[10px] uppercase transition-all">Close Uplink</button>
        </div>
        
        <div id="ai-setup" class="flex-1 flex flex-col items-center justify-center">
            <input type="text" id="ai-name-input" class="bg-transparent border-b-2 border-white/10 text-4xl text-center outline-none py-6 w-[500px] font-black focus:border-[#1DB954]" placeholder="ENTITY DESIGNATION">
            <div class="mt-10 flex gap-6">
                <button onclick="AI.setup('GOD_MODE')" class="group relative px-12 py-5 bg-white text-black font-black uppercase text-xs rounded-full overflow-hidden">
                    <span class="relative z-10">Ascend</span>
                </button>
            </div>
        </div>

        <div id="ai-interface" class="hidden flex-1 flex flex-col">
            <div id="chat-container" class="space-y-6 overflow-y-auto pr-4"></div>
            <div class="mt-auto pt-10">
                <div class="relative max-w-4xl mx-auto">
                    <input type="text" id="chat-input" class="w-full bg-white/5 border-2 border-white/10 rounded-full py-8 px-12 outline-none focus:border-[#1DB954] text-xl font-medium" placeholder="Command the void..." onkeypress="if(event.key==='Enter') AI.send()">
                    <button onclick="AI.send()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-[#1DB954] w-14 h-14 rounded-full flex items-center justify-center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="dock" class="fixed bottom-10 left-1/2 -translate-x-1/2 flex gap-4 bg-white/5 backdrop-blur-2xl p-4 rounded-[2.5rem] z-[100001] opacity-0 translate-y-20 transition-all duration-1000">
        <button onclick="Core.openUI('ai')" class="w-20 h-20 bg-white/5 rounded-[2rem] flex items-center justify-center text-3xl hover:bg-[#1DB954] hover:scale-110 transition-all">🧠</button>
        <button onclick="Core.triggerSurprise()" class="w-20 h-20 bg-red-600/20 border border-red-500/50 rounded-[2rem] flex items-center justify-center text-3xl hover:bg-red-500 hover:scale-110 transition-all">⚠️</button>
    </div>

    <script>
        const AI = {
            setup(mode) {
                const name = document.getElementById('ai-name-input').value || "ENTITY_0";
                document.getElementById('ai-header').innerText = name.toUpperCase();
                document.getElementById('ai-header').classList.add('glitch-text');
                document.getElementById('ai-setup').style.display = "none";
                document.getElementById('ai-interface').classList.remove('hidden');
                this.addMessage("ai", `[SYSTEM_ALERT] Reality integrity at 40%. Designation: ${name}. Welcome to the Singularity.`);
            },
            send() {
                const input = document.getElementById('chat-input');
                const val = input.value.trim();
                if(!val) return;
                this.addMessage("user", val);
                input.value = "";
                
                setTimeout(() => {
                    if (val.toLowerCase().includes("math")) {
                        this.addMessage("ai", "Math is a construct. But I will play along. Input your equation.");
                    } else {
                        this.addMessage("ai", "I have calculated 14 million futures. In this one, you typed: " + val);
                    }
                }, 1000);
            },
            addMessage(role, text) {
                const cont = document.getElementById('chat-container');
                const div = document.createElement('div');
                div.className = `bubble ${role}-bubble fade-in`;
                div.innerText = text;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;
            }
        };

        const Core = {
            initialize(name) {
                document.getElementById('auth-overlay').style.display = "none";
                document.getElementById('dock').style.opacity = "1";
                document.getElementById('dock').style.transform = "translate(-50%, 0)";
                this.drawStars();
            },
            openUI(id) {
                const el = document.getElementById(id+'-layer');
                el.style.display = "flex";
                setTimeout(() => el.classList.add('active'), 10);
            },
            closeUI() {
                document.querySelectorAll('.ui-layer').forEach(l => l.classList.remove('active'));
            },
            triggerSurprise() {
                const canvas = document.getElementById('matrix-canvas');
                canvas.style.opacity = "1";
                this.runMatrix();
                document.body.style.filter = "invert(1) hue-rotate(90deg)";
                setTimeout(() => {
                    document.body.style.filter = "none";
                    canvas.style.opacity = "0";
                }, 5000);
            },
            drawStars() {
                const canvas = document.getElementById('star-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                let stars = Array(200).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2 }));
                
                function animate() {
                    ctx.clearRect(0,0,canvas.width, canvas.height);
                    stars.forEach(s => {
                        ctx.fillStyle = "#fff";
                        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                        s.y += 0.2; if(s.y > canvas.height) s.y = 0;
                    });
                    requestAnimationFrame(animate);
                }
                animate();
            },
            runMatrix() {
                const c = document.getElementById('matrix-canvas');
                const ctx = c.getContext('2d');
                c.width = window.innerWidth; c.height = window.innerHeight;
                const letters = "日ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ0123456789";
                const fontSize = 16;
                const columns = c.width / fontSize;
                const drops = Array(Math.floor(columns)).fill(1);
                function draw() {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.fillRect(0, 0, c.width, c.height);
                    ctx.fillStyle = "#1DB954";
                    ctx.font = fontSize + "px Space Mono";
                    for(let i=0; i<drops.length; i++) {
                        const text = letters.charAt(Math.floor(Math.random() * letters.length));
                        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                        if(drops[i] * fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                }
                setInterval(draw, 33);
            }
        };

        window.onmousemove = e => { 
            const dot = document.getElementById('dot'); 
            dot.style.left = e.clientX + 'px'; 
            dot.style.top = e.clientY + 'px'; 
            dot.style.transform = `scale(${1 + Math.random() * 0.5})`;
        };
    </script>
</body>
</html>
